<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Piazza Rustica</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
}

.header {
  background:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.logo {
  font-size:22px;
  font-weight:bold;
}

.search {
  padding:10px;
  width:250px;
}

.container {
  padding:30px;
}

.title {
  font-size:26px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
}

.card:hover {
  transform:scale(1.02);
}

.image {
  height:150px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#666;
}

.content {
  padding:15px;
}

.name {
  font-size:18px;
  font-weight:bold;
}

.desc {
  font-size:14px;
  color:#777;
  margin:8px 0;
}

.info {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#444;
}

.btn {
  margin-top:10px;
  padding:10px;
  background:#e63946;
  color:white;
  border:none;
  width:100%;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">La Piazza Rustica</div>
  <input class="search" placeholder="Caută restaurant...">
</div>

<div class="container">
  <div class="title">Restaurante disponibile</div>

  <div class="grid">

    <div class="card">
      <div class="image">POZA</div>
      <div class="content">
        <div class="name">La Piazza Central</div>
        <div class="desc">Pizza, paste, deserturi</div>
        <div class="info">
          <span>⭐ 4.8</span>
          <span>30-40 min</span>
        </div>
        <button class="btn">Vezi meniul</button>
      </div>
    </div>

    <div class="card">
      <div class="image">POZA</div>
      <div class="content">
        <div class="name">Rustica Nord</div>
        <div class="desc">Pizza italiană autentică</div>
        <div class="info">
          <span>⭐ 4.7</span>
          <span>25-35 min</span>
        </div>
        <button class="btn">Vezi meniul</button>
      </div>
    </div>

    <div class="card">
      <div class="image">POZA</div>
      <div class="content">
        <div class="name">Pizza Verona</div>
        <div class="desc">Pizza & băuturi</div>
        <div class="info">
          <span>⭐ 4.6</span>
          <span>35-45 min</span>
        </div>
        <button class="btn">Vezi meniul</button>
      </div>
    </div>

    <div class="card">
      <div class="image">POZA</div>
      <div class="content">
        <div class="name">Casa Pizza</div>
        <div class="desc">Pizza & desert</div>
        <div class="info">
          <span>⭐ 4.9</span>
          <span>20-30 min</span>
        </div>
        <button class="btn">Vezi meniul</button>
      </div>
    </div>

  </div>
</div>

</body>
</html>
